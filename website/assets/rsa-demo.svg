  <rect x="516" y="106" width="176" height="190" rx="12" fill="#f8f2e8" stroke="#202124" stroke-width="2"/>
  <text x="604" y="152" fill="#202124" font-family="Georgia, serif" font-size="25" font-weight="700" text-anchor="middle">RSA</text>
  <text x="604" y="184" fill="#5d5c58" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">private key</text>
