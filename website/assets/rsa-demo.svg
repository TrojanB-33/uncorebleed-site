<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="title desc">
  <title id="title">TLBlur-protected RSA key recovery concept</title>
  <desc id="desc">A simplified conceptual diagram showing passive uncore monitoring recovering an RSA key despite TLBlur-oriented protection.</desc>
