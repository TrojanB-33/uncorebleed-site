  <text x="156" y="184" fill="#5d5c58" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">AEX-aware defense</text>
  <g fill="none" stroke="#8b2522" stroke-width="3" stroke-linecap="round">
    <path d="M104 226H208"/>
    <path d="M104 250H208"/>
    <path d="M104 274H208"/>
