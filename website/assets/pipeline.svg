    <rect x="360" y="128" width="52" height="6" rx="3"/>
    <rect x="583" y="128" width="52" height="6" rx="3"/>
    <rect x="788" y="128" width="52" height="6" rx="3"/>
  </g>
  <text x="480" y="352" text-anchor="middle" fill="#a9b4b9" font-family="Arial, sans-serif" font-size="16">Passive, AEX-free monitoring through uncore PMCs</text>
