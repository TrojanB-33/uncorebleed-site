<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">UncoreBleed attack pipeline</title>
  <desc id="desc">A conceptual pipeline from SGX enclave execution to M2M PKT_MATCH monitoring and recovered behavior.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset=".58" stop-color="#141616"/>
      <stop offset="1" stop-color="#1d1512"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="420" rx="18" fill="url(#panel)"/>
  <g stroke="#2a2f31" stroke-width="1">
    <path d="M70 82H890M70 142H890M70 202H890M70 262H890M70 322H890"/>
    <path d="M160 58V350M320 58V350M480 58V350M640 58V350M800 58V350"/>
  </g>
  <g fill="none" stroke="#45d6c4" stroke-width="2" opacity=".85">
    <path d="M78 302C132 250 180 354 236 302S344 354 400 302S508 354 564 302S672 354 728 302S836 354 890 302"/>
    <path d="M78 112C132 72 180 152 236 112S344 152 400 112S508 152 564 112S672 152 728 112S836 152 890 112" opacity=".45"/>
  </g>
  <g fill="#0c0d0f" stroke="#45d6c4" stroke-width="2">
    <rect x="68" y="145" width="190" height="110" rx="8"/>
    <rect x="291" y="145" width="190" height="110" rx="8"/>
    <rect x="514" y="145" width="190" height="110" rx="8"/>
    <rect x="737" y="145" width="155" height="110" rx="8"/>
  </g>
  <g fill="#f8fbff" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="163" y="190" font-size="20" font-weight="700">SGX enclave</text>
    <text x="163" y="220" font-size="14" fill="#a9b4b9">protected execution</text>
    <text x="386" y="190" font-size="20" font-weight="700">M2M</text>
    <text x="386" y="220" font-size="14" fill="#a9b4b9">PKT_MATCH event</text>
    <text x="609" y="190" font-size="20" font-weight="700">64 B monitor</text>
    <text x="609" y="220" font-size="14" fill="#a9b4b9">address filtering</text>
    <text x="814" y="190" font-size="20" font-weight="700">Recovery</text>
    <text x="814" y="220" font-size="14" fill="#a9b4b9">behavior and secrets</text>
  </g>
  <g stroke="#ff6f61" stroke-width="4" fill="none" filter="url(#softGlow)" stroke-linecap="round">
    <path d="M258 200H291"/>
    <path d="M481 200H514"/>
    <path d="M704 200H737"/>
